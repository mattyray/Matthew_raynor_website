{% extends "base.html" %}

{% block title %}AI Chat Assistant{% endblock %}

{% block content %}
<div class="container py-5">
  <h2 class="text-center mb-4">AI Assistant</h2>
  <div id="chat-box" class="border rounded p-3 mb-3" style="height: 300px; overflow-y: auto; background: #f9f9f9;">
    <p><strong>AI:</strong> Hello! How can I assist you today?</p>
  </div>
  <form id="chat-form">
    <div class="input-group">
      <input type="text" id="user-input" class="form-control" placeholder="Type your message...">
      <button class="btn btn-primary" type="submit">Send</button>
    </div>
  </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

document.getElementById("chat-form").addEventListener("submit", async function(event) {
  event.preventDefault();
  const input = document.getElementById("user-input");
  const message = input.value.trim();
  if (!message) return;

  const chatBox = document.getElementById("chat-box");
  chatBox.innerHTML += `<p><strong>You:</strong> ${escapeHtml(message)}</p>`;
  input.value = "";

  try {
    const response = await fetch("/chat/api/", {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-CSRFToken": "{{ csrf_token }}" },
      body: JSON.stringify({ message })
    });
    const data = await response.json();
    chatBox.innerHTML += `<p><strong>AI:</strong> ${escapeHtml(data.reply || "Sorry, something went wrong.")}</p>`;
  } catch (err) {
    chatBox.innerHTML += `<p><strong>AI:</strong> Something went wrong. Please try again.</p>`;
  }
  chatBox.scrollTop = chatBox.scrollHeight;
});
</script>
{% endblock %}
